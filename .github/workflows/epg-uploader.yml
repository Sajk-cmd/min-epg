name: Update EPG

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: pip install requests

    - name: Clone iptv-org/epg
      run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber

    - name: Install dependencies
      run: |
        cd epg-grabber
        npm install

    - name: Grab EPG
      run: |
        cd epg-grabber
        npm run grab -- --channels=../my_channels.xml

    - name: Move guide to root
      run: |
        mv epg-grabber/guide.xml ./guide.xml

    - name: Filter and Upload to Dropbox
      env:
        DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
        DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      run: python filter_and_upload.py
