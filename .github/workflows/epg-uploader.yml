name: Update EPG

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: pip install requests

    - name: Run EPG Fetch and Filter
      env:
        DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
      run: python filter_and_upload.py
