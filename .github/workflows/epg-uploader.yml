name: Update EPG

on:
  schedule:
    - cron: '0 3 * * *' # Körs automatiskt varje natt kl 03:00 UTC
  workflow_dispatch: # Gör att du kan starta uppdateringen manuellt med en knapp

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python (för filtrering och Dropbox)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: pip install requests

    - name: Clone iptv-org/epg
      run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber

    - name: Install dependencies
      run: |
        cd epg-grabber
        npm install

    - name: Grab EPG for Sweden
      run: |
        cd epg-grabber
        # Vi pekar på din nya filtrerade fil istället för att låta den köra alla kanaler
        npm run grab -- --channels=../my_channels.xml

    - name: Move guide to root
      run: |
        mv epg-grabber/guide.xml ./guide_raw.xml

    - name: Filter and Upload to Dropbox
      env:
        DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
      run: python filter_and_upload.py
