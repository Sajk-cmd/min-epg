name: Update EPG

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Clone iptv-org/epg
      run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber

    - name: Install dependencies
      run: |
        cd epg-grabber
        npm install

    - name: Grab EPG
      run: |
        cd epg-grabber
        npm run grab -- --channels=../my_channels.xml

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Inställningar för stora filer
        git config --global http.postBuffer 524288000
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        
        # Rensa gamla filen och kopiera in den nya
        rm -f guide.xml
        cp epg-grabber/guide.xml ./guide.xml
        
        # Tvinga Git att lägga till filen
        git add -f guide.xml
        
        # Skapa en commit. Om inget ändrats skapar vi ändå en commit 
        # genom att amenda föregående eller skapa en ny med tidsstämpel
        git commit -m "Update EPG guide.xml - $(date)"
        
        # Pusha med force för att skriva över historiken
        for i in {1..3}; do
          git push origin main --force && break || sleep 10
        done
