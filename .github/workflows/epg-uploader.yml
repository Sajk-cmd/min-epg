name: Update EPG

on:
  schedule:
    - cron: '0 3 * * *'
      timezone: 'Europe/Stockholm'
  workflow_dispatch:

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Krävs för att GitHub-boten ska kunna pusha filen
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Clone iptv-org/epg
      run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber

    - name: Install dependencies
      run: |
        cd epg-grabber
        npm install

    - name: Grab EPG
      run: |
        cd epg-grabber
        npm run grab -- --channels=../my_channels.xml

    - name: Move guide to root
      run: |
        mv epg-grabber/guide.xml ./guide.xml

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add guide.xml
        # Committar bara om filen har ändrats
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG guide.xml" && git push)
